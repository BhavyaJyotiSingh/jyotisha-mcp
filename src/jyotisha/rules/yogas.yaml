yogas:
  # ─────────────────────────────────────────────────────────
  # Pancha Mahapurusha Yogas (The 5 Great Person Yogas)
  # ─────────────────────────────────────────────────────────
  - name: "Ruchaka Yoga"
    category: "pancha_mahapurusha"
    conditions:
      - "Mars.inOwnSign() OR Mars.inExaltation()"
      - "Mars.inKendra()"
    conclusion: "Ruchaka Yoga is present."
    effects:
      - "Courageous, leader, victorious, wealth through land/martial pursuits"
    intensity: "high"
    sources: ["BPHS 75.1-5", "Phaladeepika 6.1"]

  - name: "Bhadra Yoga"
    category: "pancha_mahapurusha"
    conditions:
      - "Mercury.inOwnSign() OR Mercury.inExaltation()"
      - "Mercury.inKendra()"
    conclusion: "Bhadra Yoga is present."
    effects:
      - "Highly intelligent, good communicator, wealthy, long-lived"
    intensity: "high"
    sources: ["BPHS 75.1-5"]

  - name: "Hamsa Yoga"
    category: "pancha_mahapurusha"
    conditions:
      - "Jupiter.inOwnSign() OR Jupiter.inExaltation()"
      - "Jupiter.inKendra()"
    conclusion: "Hamsa Yoga is present."
    effects:
      - "Virtuous, spiritual wisdom, respected, comfortable life"
    intensity: "high"
    sources: ["BPHS 75.1-5"]

  - name: "Malavya Yoga"
    category: "pancha_mahapurusha"
    conditions:
      - "Venus.inOwnSign() OR Venus.inExaltation()"
      - "Venus.inKendra()"
    conclusion: "Malavya Yoga is present."
    effects:
      - "Beautiful, luxurious life, artistic, happy marriage"
    intensity: "high"
    sources: ["BPHS 75.1-5"]

  - name: "Shasha Yoga"
    category: "pancha_mahapurusha"
    conditions:
      - "Saturn.inOwnSign() OR Saturn.inExaltation()"
      - "Saturn.inKendra()"
    conclusion: "Shasha Yoga is present."
    effects:
      - "Authority, commands others, disciplined, success in politics/land"
    intensity: "high"
    sources: ["BPHS 75.1-5"]

  # ─────────────────────────────────────────────────────────
  # Lunar Yogas
  # ─────────────────────────────────────────────────────────
  - name: "Gajakesari Yoga"
    category: "raja"
    conditions:
      - "Jupiter.inKendraFrom(Moon)"
    conclusion: "Gajakesari Yoga is present."
    effects:
      - "Fame, wisdom, powerful speaker, wealth, lasting reputation"
    intensity: "very_high"
    sources: ["BPHS 37.1", "Phaladeepika 6.14"]
    cancellation_conditions:
      - "Jupiter.combust"
      - "Jupiter.debilitated"

  - name: "Sunapha Yoga"
    category: "dhana"
    conditions:
      - "Moon.house(2).hasPlanetExcluding(Sun, Rahu, Ketu)"
    conclusion: "Sunapha Yoga is present."
    effects:
      - "Self-acquired wealth, intelligence, good status"
    intensity: "medium"
    sources: ["BPHS 37.2-4"]

  - name: "Anapha Yoga"
    category: "dhana"
    conditions:
      - "Moon.house(12).hasPlanetExcluding(Sun, Rahu, Ketu)"
    conclusion: "Anapha Yoga is present."
    effects:
      - "Healthy, well-mannered, renown, quiet enjoyment of life"
    intensity: "medium"
    sources: ["BPHS 37.2-4"]

  - name: "Durudhura Yoga"
    category: "dhana"
    conditions:
      - "Moon.house(2).hasPlanetExcluding(Sun, Rahu, Ketu)"
      - "Moon.house(12).hasPlanetExcluding(Sun, Rahu, Ketu)"
    conclusion: "Durudhura Yoga is present."
    effects:
      - "Famous, wealthy, charitable, good vehicles and servants"
    intensity: "high"
    sources: ["BPHS 37.2-4"]

  - name: "Kemadruma Yoga"
    category: "dosha"
    conditions:
      - "Moon.house(2).emptyExcluding(Sun, Rahu, Ketu)"
      - "Moon.house(12).emptyExcluding(Sun, Rahu, Ketu)"
    conclusion: "Kemadruma Yoga is present (isolation/hardship)."
    effects:
      - "Mental distress, poverty, feeling unsupported"
    intensity: "high"
    sources: ["BPHS 37.25"]
    cancellation_conditions:
      - "Moon.inKendra()"
      - "Jupiter.aspects(Moon)"
      - "Moon.conjunct(Benefic)"

  # ─────────────────────────────────────────────────────────
  # Solar Yogas
  # ─────────────────────────────────────────────────────────
  - name: "Vesi Yoga"
    category: "dhana"
    conditions:
      - "Sun.house(2).hasPlanetExcluding(Moon, Rahu, Ketu)"
    conclusion: "Vesi Yoga is present."
    effects:
      - "Truthful, aristocratic, wealthy"
    intensity: "medium"
    sources: ["BPHS 37.31"]

  - name: "Vasi Yoga"
    category: "dhana"
    conditions:
      - "Sun.house(12).hasPlanetExcluding(Moon, Rahu, Ketu)"
    conclusion: "Vasi Yoga is present."
    effects:
      - "Skillful, charitable, good speech"
    intensity: "medium"
    sources: ["BPHS 37.31"]

  - name: "Ubhayachari Yoga"
    category: "dhana"
    conditions:
      - "Sun.house(2).hasPlanetExcluding(Moon, Rahu, Ketu)"
      - "Sun.house(12).hasPlanetExcluding(Moon, Rahu, Ketu)"
    conclusion: "Ubhayachari Yoga is present."
    effects:
      - "Equal to a king, very wealthy, popular"
    intensity: "high"
    sources: ["BPHS 37.31"]

  # ─────────────────────────────────────────────────────────
  # Specific Wealth / Misfortune / Intellectual Yogas
  # ─────────────────────────────────────────────────────────
  - name: "Chandra-Mangala Yoga"
    category: "dhana"
    conditions:
      - "Mars.conjunct(Moon)"
    conclusion: "Chandra-Mangala Yoga is present."
    effects:
      - "Wealth through enterprise, assertive, sometimes harsh speech"
    intensity: "medium"
    sources: ["BPHS 37.8"]

  - name: "Budhaditya Yoga"
    category: "intellect"
    conditions:
      - "Sun.conjunct(Mercury)"
    conclusion: "Budhaditya Yoga is present (Sun conjunct Mercury)."
    effects:
      - "Highly intelligent, good reputation, administrative skill"
    intensity: "medium"
    sources: ["Saravali 35.12"]

  - name: "Saraswati Yoga"
    category: "intellect"
    conditions:
      - "Jupiter.inKendraOrTrikona() OR Jupiter.inHouse(2)"
      - "Venus.inKendraOrTrikona() OR Venus.inHouse(2)"
      - "Mercury.inKendraOrTrikona() OR Mercury.inHouse(2)"
    conclusion: "Saraswati Yoga is present."
    effects:
      - "Highly learned in arts/sciences, poetic, wealthy, globally famous"
    intensity: "high"
    sources: ["Phaladeepika 6.26"]

  - name: "Dharma-Karma Adhipati Yoga"
    category: "raja"
    conditions:
      - "House(9).lord.conjunct(House(10).lord)"
    conclusion: "Dharma-Karma Adhipati Yoga is present."
    effects:
      - "High status, fame, prosperity, authority"
    intensity: "very_high"
    sources: ["BPHS 41.2"]

  - name: "Lakshmi Yoga"
    category: "dhana"
    conditions:
      - "House(9).lord.inKendraOrTrikona()"
    conclusion: "Lakshmi Yoga is present."
    effects:
      - "Highly wealthy, handsome, noble, respected by society"
    intensity: "very_high"
    sources: ["BPHS 42.5"]

  # ─────────────────────────────────────────────────────────
  # Viparita Raja Yogas
  # ─────────────────────────────────────────────────────────
  - name: "Viparita Raja Yoga (Harsha)"
    category: "raja"
    conditions:
      - "House(6).lord.inDussthana()"
    conclusion: "Viparita Raja Yoga (Harsha) is present."
    effects:
      - "Victory over enemies, sudden gains through crisis"
    intensity: "high"
    sources: ["BPHS 40.14"]

  - name: "Viparita Raja Yoga (Sarala)"
    category: "raja"
    conditions:
      - "House(8).lord.inDussthana()"
    conclusion: "Viparita Raja Yoga (Sarala) is present."
    effects:
      - "Long-lived, wealthy, success after struggle, defeats enemies"
    intensity: "high"
    sources: ["BPHS 40.15"]

  - name: "Viparita Raja Yoga (Vimala)"
    category: "raja"
    conditions:
      - "House(12).lord.inDussthana()"
    conclusion: "Viparita Raja Yoga (Vimala) is present."
    effects:
      - "Saves money, independent character, honorable profession"
    intensity: "high"
    sources: ["BPHS 40.16"]

  - name: "Neechabhanga Raja Yoga"
    category: "raja"
    conditions:
      - type: "composite"
        any_of:
          - "DebilitatedPlanet.dispositor.inKendra()"
          - "DebilitatedPlanet.dispositor.exalted()"
    conclusion: "Neechabhanga Raja Yoga is present."
    effects:
      - "Initial struggle followed by massive success and elevation"
    intensity: "very_high"
    sources: ["BPHS 40.7-12"]
